components:
  schemas:
    ConstraintViolation:
      description: 'Unprocessable entity'
      properties:
        status:
          type: integer
          default: 422
        violations:
          type: array
          items:
            required:
              - propertyPath
              - message
            properties:
              propertyPath:
                description: 'The property path of the violation'
                type: string
              message:
                description: 'The message associated with the violation'
                type: string
              code:
                description: 'The code of the violation'
                type: string
              hint:
                description: 'An extra hint to understand the violation'
                type: string
              payload:
                description: 'The serialized payload of the violation'
                type: object
                additionalProperties: true
            type: object
        detail:
          type: string
          readOnly: true
        type:
          type: string
          readOnly: true
        title:
          type: string
          readOnly: true
          nullable: true
        instance:
          type: string
          readOnly: true
          nullable: true
      type: object
    ConstraintViolation.jsonld:
      description: 'Unprocessable entity'
      allOf:
        -
          $ref: '#/components/schemas/HydraItemBaseSchema'
        -
          properties:
            status:
              type: integer
              default: 422
            violations:
              type: array
              items:
                required:
                  - propertyPath
                  - message
                properties:
                  propertyPath: { description: 'The property path of the violation', type: string }
                  message: { description: 'The message associated with the violation', type: string }
