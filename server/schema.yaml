components:
  schemas:
    ConstraintViolation:
      type: object
      description: 'Unprocessable entity'
      properties:
        status:
          default: 422
          type: integer
        violations:
          type: array
          items:
            type: object
            properties:
              propertyPath:
                type: string
                description: 'The property path of the violation'
              message:
                type: string
                description: 'The message associated with the violation'
              code:
                type: string
                description: 'The code of the violation'
              hint:
                type: string
                description: 'An extra hint to understand the violation'
              payload:
                type: object
                additionalProperties: true
                description: 'The serialized payload of the violation'
            required:
              - propertyPath
              - message
        detail:
          readOnly: true
          type: string
        type:
          readOnly: true
          type: string
        title:
          readOnly: true
          type:
            - string
            - 'null'
        instance:
          readOnly: true
          type:
            - string
            - 'null'
    ConstraintViolation.jsonld:
      allOf:
        -
          $ref: '#/components/schemas/HydraItemBaseSchema'
        -
          type: object
          properties:
            status:
              default: 422
              type: integer
            violations:
              type: array
              items:
                type: object
                properties:
                  propertyPath: { type: string, description: 'The property path of the violation' }
                  message: { type: string, description: 'The message associated with the violation' }
                  code: { type: string, description: 'The code of the violation' }
                  hint: { type: string, description: 'An extra hint to understand the violation' }
                  payload: { type: object, additionalProperties: true, description: 'The serialized payload of the violation' }
                required:
                  - propertyPath
                  - message
            detail:
              readOnly: true
              type: string
            description:
              readOnly: true
              type: string
            type:
              readOnly: true
              type: string
            title:
              readOnly: true
              type:
                - string
                - 'null'
            instance:
              readOnly: true
              type:
                - string
                - 'null'
      description: 'Unprocessable entity'
    Error:
      type: object
      description: 'A representation of common errors.'
      properties:
        title:
          readOnly: true
          description: 'A short, human-readable summary of the problem.'
          type:
            - string
            - 'null'
        detail:
          readOnly: true
          description: 'A human-readable explanation specific to this occurrence of the problem.'
          type:
            - string
            - 'null'
        status:
          type:
            - number
            - 'null'
          examples:
            - 404
          default: 400
        instance:
          readOnly: true
          description: 'A URI reference that identifies the specific occurrence of the problem. It may or may not yield further information if dereferenced.'
          type:
            - string
            - 'null'
        type:
          readOnly: true
          description: 'A URI reference that identifies the problem type'
          type: string
    Error.jsonld:
      allOf:
        -
          $ref: '#/components/schemas/HydraItemBaseSchema'
        -
          type: object
          properties:
            title:
              readOnly: true
              description: 'A short, human-readable summary of the problem.'
              type:
                - string
                - 'null'
            detail:
              readOnly: true
              description: 'A human-readable explanation specific to this occurrence of the problem.'
              type:
                - string
                - 'null'
            status:
              type:
                - number
                - 'null'
              examples:
                - 404
              default: 400
            instance:
              readOnly: true
              description: 'A URI reference that identifies the specific occurrence of the problem. It may or may not yield further information if dereferenced.'
              type:
                - string
                - 'null'
            type:
              readOnly: true
              description: 'A URI reference that identifies the problem type'
              type: string
            description:
              readOnly: true
              type:
                - string
                - 'null'
      description: 'A representation of common errors.'
    HydraCollectionBaseSchema:
      allOf:
        -
          $ref: '#/components/schemas/HydraCollectionBaseSchemaNoPagination'
        -
          type: object
          properties:
            view:
              type: object
              properties:
                '@id':
                  type: string
                  format: iri-reference
                '@type':
                  type: string
                first:
                  type: string
                  format: iri-reference
                last:
                  type: string
                  format: iri-reference
                previous:
                  type: string
                  format: iri-reference
                next:
                  type: string
                  format: iri-reference
              example:
                '@id': string
                '@type': string
                first: string
                last: string
                previous: string
                next: string
    HydraCollectionBaseSchemaNoPagination:
      type: object
      properties:
        totalItems:
          type: integer
          minimum: 0
        search:
          type: object
          properties:
            '@type':
              type: string
            template:
              type: string
            variableRepresentation:
              type: string
            mapping:
              type: array
              items:
                type: object
                properties:
                  '@type': { type: string }
                  variable: { type: string }
                  property: { type: [string, 'null'] }
                  required: { type: boolean }
    HydraItemBaseSchema:
      type: object
      properties:
        '@context':
          oneOf:
            -
              type: string
            -
              type: object
              properties:
                '@vocab':
                  type: string
                hydra:
                  type: string
                  enum: ['http://www.w3.org/ns/hydra/core#']
              required:
                - '@vocab'
                - hydra
              additionalProperties: true
        '@id':
          type: string
        '@type':
          type: string
      required:
        - '@id'
        - '@type'
    Link:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        name:
          type: string
        url:
          type: string
        collection_id:
          type: string
          format: iri-reference
          example: 'https://example.com/'
        collectionId:
          type:
            - string
            - 'null'
          format: iri-reference
          example: 'https://example.com/'
    Link.jsonMergePatch:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        name:
          type: string
        url:
          type: string
        collection_id:
          type: string
          format: iri-reference
          example: 'https://example.com/'
        collectionId:
          type:
            - string
            - 'null'
          format: iri-reference
          example: 'https://example.com/'
    Link.jsonld:
      allOf:
        -
          $ref: '#/components/schemas/HydraItemBaseSchema'
        -
          type: object
          properties:
            id:
              readOnly: true
              type: integer
            name:
              type: string
            url:
              type: string
            collection_id:
              type: string
              format: iri-reference
              example: 'https://example.com/'
            collectionId:
              type:
                - string
                - 'null'
              format: iri-reference
              example: 'https://example.com/'
    LinkCollection:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        name:
          type: string
        public:
          type: boolean
        user_id:
          $ref: '#/components/schemas/User'
        links:
          type: array
          items:
            type: string
            format: iri-reference
            example: 'https://example.com/'
        userId:
          anyOf:
            -
              $ref: '#/components/schemas/User'
            -
              type: 'null'
    LinkCollection.jsonMergePatch:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        name:
          type: string
        public:
          type: boolean
        user_id:
          $ref: '#/components/schemas/User'
        links:
          type: array
          items:
            type: string
            format: iri-reference
            example: 'https://example.com/'
        userId:
          anyOf:
            -
              $ref: '#/components/schemas/User'
            -
              type: 'null'
    LinkCollection.jsonld:
      allOf:
        -
          $ref: '#/components/schemas/HydraItemBaseSchema'
        -
          type: object
          properties:
            id:
              readOnly: true
              type: integer
            name:
              type: string
            public:
              type: boolean
      properties:
        user_id:
          $ref: '#/components/schemas/User.jsonld'
        links:
          type: array
          items:
            type: string
            format: iri-reference
            example: 'https://example.com/'
        userId:
          anyOf:
            -
              $ref: '#/components/schemas/User.jsonld'
            -
              type: 'null'
    User:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        username:
          type: string
        roles:
          description: 'The user roles'
          type: array
          items:
            type: string
        password:
          description: 'The hashed password'
          type: string
        linkCollections:
          type: array
          items:
            $ref: '#/components/schemas/LinkCollection'
        userIdentifier:
          readOnly: true
          description: 'A visual identifier that represents this user.'
          type: string
    User.jsonld:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
        username:
          type: string
        roles:
          description: 'The user roles'
          type: array
          items:
            type: string
        password:
          description: 'The hashed password'
          type: string
        linkCollections:
          type: array
          items:
            $ref: '#/components/schemas/LinkCollection.jsonld'
        userIdentifier:
          readOnly: true
          description: 'A visual identifier that represents this user.'
          type: string
  responses: {  }
  parameters: {  }
  examples: {  }
  requestBodies: {  }
  headers: {  }
  securitySchemes:
    JWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
security: []
tags:
